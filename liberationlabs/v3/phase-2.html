<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1480"/>
<title>Liberation Labs — Field Guide · Phase 2</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,200;0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root{
    /* Kintsugi ceramic grounds */
    --ceramic-void:#07070a;
    --ceramic-black:#0d0d11;
    --ceramic-charcoal:#171720;
    --ceramic-panel:#1c1d28;
    --ceramic-raised:#252634;
    --ceramic-rule:rgba(244,217,138,.12);
    --ceramic-rule-2:rgba(244,217,138,.22);

    /* Molten gold vein system */
    --vein-deep:#5a3a10;
    --vein-amber:#a5761f;
    --vein-gold:#c8984a;
    --vein-light:#f4d98a;
    --vein-bright:#ffe9a8;
    --vein-highlight:#fff4c8;

    /* Cool accents */
    --indigo-deep:#0d1b2a;
    --indigo:#1a2f4a;
    --indigo-cosmic:#1a1f5a;
    --indigo-electric:#2b4fa0;

    /* Type */
    --ink:#e8ecf5;
    --ink-2:#98a0b8;
    --ink-3:#5c6178;
    --ink-4:#3a3d50;

    /* Semantic */
    --ok:#7ab89a;
    --warn:#d4a84a;
    --err:#c8604a;
    --info:#6a8cc8;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--ceramic-void);color:var(--ink);}
  body{
    font-family:'IBM Plex Serif',serif;font-weight:300;
    min-height:100vh;
    /* subtle kintsugi vignette + graph paper */
    background:
      radial-gradient(1600px 900px at 20% -10%, rgba(26,31,90,.18) 0%, transparent 55%),
      radial-gradient(900px 600px at 110% 110%, rgba(200,152,74,.08) 0%, transparent 60%),
      var(--ceramic-void);
  }
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      linear-gradient(rgba(232,236,255,.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,236,255,.02) 1px, transparent 1px);
    background-size:32px 32px;
    mask-image:radial-gradient(ellipse 80% 70% at 50% 40%, #000 30%, transparent 90%);
    -webkit-mask-image:radial-gradient(ellipse 80% 70% at 50% 40%, #000 30%, transparent 90%);
  }

  /* ============ CHROME ============ */
  .chrome{
    position:sticky;top:0;z-index:100;
    background:rgba(7,7,10,.85);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border-bottom:1px solid var(--ceramic-rule);
  }
  .chrome-inner{
    max-width:1480px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;
    padding:18px 44px;gap:24px;
  }
  .chrome-brand{display:flex;align-items:center;gap:14px;font-family:'IBM Plex Serif',serif;font-size:15px;color:var(--ink);}
  .chrome-brand .seal{
    width:26px;height:26px;border-radius:50%;
    background:
      radial-gradient(circle at 32% 28%, #fff4c8 0%, #f4d98a 22%, #c8984a 48%, #6a4510 82%, #2a1c0a 100%);
    box-shadow:inset 0 0 6px rgba(0,0,0,.55), 0 0 0 1px rgba(244,217,138,.25);
    position:relative;flex-shrink:0;
  }
  .chrome-brand .seal::after{content:'';position:absolute;inset:4px;border-radius:50%;border:1px solid rgba(42,28,10,.4);}
  .chrome-brand em{font-style:italic;color:var(--ink-2);font-weight:300;}
  .chrome-brand span.sep{color:var(--ink-4);margin:0 2px;}
  .chrome-brand small{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--vein-gold);text-transform:uppercase;margin-left:4px;}

  .tabs{display:flex;gap:2px;padding:4px;border:1px solid var(--ceramic-rule);background:rgba(255,255,255,.02);border-radius:2px;}
  .tab{
    appearance:none;border:0;background:transparent;color:var(--ink-2);cursor:pointer;
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
    padding:10px 16px;border-radius:2px;
    display:flex;align-items:center;gap:9px;transition:color .18s, background .18s;
  }
  .tab:hover{color:var(--ink);}
  .tab.is-active{
    background:linear-gradient(180deg, rgba(42,28,10,.7) 0%, rgba(26,16,5,.7) 100%);
    color:var(--vein-light);
    box-shadow:inset 0 1px 0 rgba(244,217,138,.2), 0 1px 0 rgba(0,0,0,.4);
  }
  .tab .rn{font-size:9.5px;color:var(--ink-4);letter-spacing:.18em;}
  .tab.is-active .rn{color:var(--vein-gold);}
  .chrome-meta{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.16em;color:var(--ink-3);text-transform:uppercase;}

  /* ============ PAGE FRAME ============ */
  main{position:relative;z-index:1;}
  .page{display:none;max-width:1480px;margin:0 auto;padding:64px 44px 140px;}
  .page.is-active{display:block;}

  /* Shared plate header */
  .plate-hd{
    display:flex;align-items:baseline;gap:22px;
    padding:24px 0 18px;margin-bottom:36px;border-top:1px solid var(--ceramic-rule);
  }
  .plate-hd .num{
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.22em;
    color:var(--vein-gold);text-transform:uppercase;padding:4px 10px;
    border:1px solid rgba(200,152,74,.4);border-radius:2px;
  }
  .plate-hd h2{
    font-family:'IBM Plex Serif',serif;font-weight:300;font-size:30px;margin:0;
    letter-spacing:-.01em;color:var(--ink);
  }
  .plate-hd h2 em{font-style:italic;color:var(--vein-light);font-weight:300;}
  .plate-hd .latin{
    font-family:'IBM Plex Serif',serif;font-style:italic;font-size:14.5px;color:var(--ink-2);
    font-weight:300;margin-left:auto;
  }

  /* Shared journal masthead */
  .journal-mast{
    padding:44px 0 16px;border-bottom:2px solid var(--vein-gold);margin-bottom:2px;
    display:grid;grid-template-columns:auto 1fr auto;gap:40px;align-items:end;
  }
  .journal-mast::after{content:'';grid-column:1/-1;height:1px;background:var(--vein-gold);margin-top:4px;}
  .journal-mast .mark{display:flex;align-items:center;gap:18px;}
  .journal-mast .seal{
    width:64px;height:64px;border-radius:50%;
    background:radial-gradient(circle at 32% 28%, #fff4c8 0%, #f4d98a 20%, #c8984a 48%, #6a4510 82%, #2a1c0a 100%);
    box-shadow:inset 0 0 14px rgba(0,0,0,.65), 0 0 0 1px rgba(244,217,138,.25);position:relative;flex-shrink:0;
  }
  .journal-mast .seal::after{content:'';position:absolute;inset:9px;border-radius:50%;border:1px solid rgba(42,28,10,.55);}
  .journal-mast h1{
    font-family:'IBM Plex Serif',serif;font-weight:300;font-size:40px;line-height:1;margin:0 0 6px;
    letter-spacing:-.01em;
  }
  .journal-mast h1 em{font-style:italic;color:var(--vein-light);}
  .journal-mast .sub{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;color:var(--ink-2);text-transform:uppercase;}
  .journal-mast .meta{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:var(--ink-3);text-transform:uppercase;text-align:right;line-height:1.9;}
  .journal-mast .meta b{color:var(--ink);font-weight:500;}

  /* registration crosshairs */
  .regmark{position:absolute;width:14px;height:14px;opacity:.55;pointer-events:none;}
  .regmark::before,.regmark::after{content:'';position:absolute;background:var(--vein-gold);}
  .regmark::before{left:50%;top:0;bottom:0;width:1px;transform:translateX(-.5px);}
  .regmark::after{top:50%;left:0;right:0;height:1px;transform:translateY(-.5px);}

  /* Utility */
  .rule-gold{height:1px;background:linear-gradient(90deg, transparent 0%, var(--vein-gold) 15%, var(--vein-light) 50%, var(--vein-gold) 85%, transparent 100%);opacity:.5;}
  a{color:inherit;}
</style>
</head>
<body>

<nav class="chrome">
  <div class="chrome-inner">
    <div class="chrome-brand">
      <span class="seal"></span>
      <span>Liberation Labs</span>
      <span class="sep">/</span>
      <em>Field Guide · Phase II</em>
      <small>vol. i, no. 02</small>
    </div>
    <div class="tabs" role="tablist" id="tabs">
      <button class="tab is-active" data-dir="intro"><span class="rn">§</span>Intro</button>
      <button class="tab" data-dir="logo"><span class="rn">I</span>Logo</button>
      <button class="tab" data-dir="type"><span class="rn">II</span>Type</button>
      <button class="tab" data-dir="color"><span class="rn">III</span>Color</button>
      <button class="tab" data-dir="components"><span class="rn">IV</span>Components</button>
      <button class="tab" data-dir="home"><span class="rn">V</span>Homepage</button>
    </div>
    <div class="chrome-meta">iv · mmxxvi</div>
  </div>
</nav>

<main>
  <section class="page is-active" data-dir="intro" id="page-intro"></section>
  <section class="page" data-dir="logo" id="page-logo"></section>
  <section class="page" data-dir="type" id="page-type"></section>
  <section class="page" data-dir="color" id="page-color"></section>
  <section class="page" data-dir="components" id="page-components"></section>
  <section class="page" data-dir="home" id="page-home"></section>
</main>

<script>
  const KEY='liblabs_p2';
  const tabs=document.querySelectorAll('.tab');
  const pages=document.querySelectorAll('.page');
  function show(d){
    tabs.forEach(t=>t.classList.toggle('is-active', t.dataset.dir===d));
    pages.forEach(p=>p.classList.toggle('is-active', p.dataset.dir===d));
    localStorage.setItem(KEY,d);
    window.scrollTo({top:0,behavior:'instant'});
  }
  tabs.forEach(t=>t.addEventListener('click',()=>show(t.dataset.dir)));
  const s=localStorage.getItem(KEY); if(s) show(s);
</script>

<!-- INTRO -->
<script>
(function(){
  const root=document.getElementById('page-intro');
  root.innerHTML=`
  <header class="journal-mast">
    <div class="mark">
      <div class="seal"></div>
      <div>
        <h1>Liberation Labs <em>Field Guide</em></h1>
        <div class="sub">Phase II · Applied Identity System</div>
      </div>
    </div>
    <div></div>
    <div class="meta">
      <div><b>Vol. I, No. 02</b></div>
      <div>Apr · mmxxvi</div>
      <div>Palette: <b>Kintsugi</b></div>
    </div>
  </header>

  <div style="display:grid;grid-template-columns:1.2fr .8fr;gap:64px;margin-top:64px;">
    <div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.22em;color:var(--vein-gold);text-transform:uppercase;margin-bottom:24px;display:flex;align-items:center;gap:12px;">
        <span style="width:22px;height:1px;background:var(--vein-gold);"></span>
        Introduction to the Guide
      </div>
      <h2 style="font-family:'IBM Plex Serif',serif;font-weight:280;font-size:68px;line-height:1;margin:0 0 28px;letter-spacing:-.025em;color:var(--ink);">
        A system for <em style="font-style:italic;color:var(--vein-light);font-weight:280;">repair</em>.
      </h2>
      <div style="column-count:2;column-gap:32px;font-size:15.5px;line-height:1.7;color:var(--ink);font-weight:300;">
        <p style="margin:0 0 14px;break-inside:avoid;">
          <span style="font-size:58px;line-height:.9;float:left;padding:8px 10px 0 0;color:var(--vein-light);font-weight:300;">T</span>his volume codifies the visual system for Liberation Labs: a <em style="font-style:italic;color:var(--vein-light);">worker-owned cooperative</em> building AI infrastructure for communities whose values come first. The identity is constructed as a scientific field guide — a tradition that has earned trust across centuries of natural history — and grounded in a <strong style="font-weight:500;color:var(--ink);font-variant:small-caps;letter-spacing:.06em;">kintsugi palette</strong>: deep ceramic darks, repaired with molten gold.
        </p>
        <p style="margin:0 0 14px;break-inside:avoid;">
          The metaphor is operational, not decorative. Infrastructure has been broken for many of the communities we serve — broken by extraction, surveillance, carelessness. Gold is the record of <em style="font-style:italic;color:var(--vein-light);">repair</em>: present only where the seams show, luminous where people are rejoined. The cool indigos are kept as a reminder of scale — the night sky behind the bowl.
        </p>
        <p style="margin:0;break-inside:avoid;">
          What follows are five plates — logo, type, color, components, and a complete homepage — each plate rigorous enough to act as a source-of-truth for applied work.
        </p>
      </div>
    </div>

    <aside style="border:1px solid var(--ceramic-rule);background:rgba(28,29,40,.4);padding:28px 30px;border-radius:2px;position:relative;align-self:start;">
      <div style="position:absolute;top:-1px;right:-1px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:#2a1c0a;background:var(--vein-gold);padding:5px 11px;">Contents</div>
      <h4 style="font-family:'IBM Plex Serif',serif;font-style:italic;font-weight:400;font-size:18px;margin:8px 0 22px;color:var(--ink);">In this volume</h4>
      ${[
        ['I','Logo','de signo — mark, cog, lockups','logo'],
        ['II','Type','de characteribus — six-level hierarchy','type'],
        ['III','Color','pigmenta — kintsugi palette','color'],
        ['IV','Components','apparatus — UI in the field register','components'],
        ['V','Homepage','frons publica — applied specimen','home'],
      ].map(([n,t,l,d])=>`
        <button data-goto="${d}" style="all:unset;cursor:pointer;display:grid;grid-template-columns:28px 1fr auto;gap:14px;align-items:baseline;padding:14px 0;border-top:1px solid var(--ceramic-rule);width:100%;">
          <span style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.18em;color:var(--vein-gold);">${n}</span>
          <span>
            <div style="font-family:'IBM Plex Serif',serif;font-size:16px;color:var(--ink);">${t}</div>
            <div style="font-family:'IBM Plex Serif',serif;font-style:italic;font-size:12.5px;color:var(--ink-2);margin-top:2px;">${l}</div>
          </span>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:14px;color:var(--vein-gold);">→</span>
        </button>`).join('')}
    </aside>
  </div>

  <div style="margin-top:96px;padding:36px 0;border-top:1px solid var(--ceramic-rule);border-bottom:1px solid var(--ceramic-rule);text-align:center;">
    <p style="font-family:'IBM Plex Serif',serif;font-style:italic;font-weight:300;font-size:30px;line-height:1.3;margin:0;max-width:920px;margin-inline:auto;color:var(--ink);letter-spacing:-.005em;">
      “Infrastructure is a kind of <em style="color:var(--vein-light);">writing</em>. If we build it, we are writing down what we believe — and who we expect to be accountable to.”
    </p>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.22em;color:var(--ink-3);text-transform:uppercase;margin-top:22px;">— from the Commons Charter</div>
  </div>`;
  root.querySelectorAll('[data-goto]').forEach(b=>b.addEventListener('click',()=>{
    document.querySelector('.tab[data-dir="'+b.dataset.goto+'"]').click();
  }));
})();
</script>

<!-- PLATE I — LOGO -->
<script>
(function(){
  const root=document.getElementById('page-logo');
  root.innerHTML=`
  <div class="plate-hd">
    <span class="num">Plate I</span>
    <h2>Mark &amp; <em>lockup system</em></h2>
    <span class="latin">de signo — signum fabricae liberationis</span>
  </div>

  <!-- WORDMARK + PRIMARY LOCKUP -->
  <div style="display:grid;grid-template-columns:1.1fr .9fr;gap:44px;margin-bottom:56px;">
    <div style="border:1px solid var(--ceramic-rule);background:linear-gradient(180deg, rgba(28,29,40,.4) 0%, rgba(13,13,17,.7) 100%);padding:56px 48px;position:relative;border-radius:2px;min-height:360px;display:flex;flex-direction:column;justify-content:center;">

      <div style="border:1px solid var(--ceramic-rule);background:rgba(28,29,40,.4);padding:16px 22px;border-radius:2px;position:relative;display:flex;align-items:center;justify-content:space-between;gap:18px;">

  <!-- MONOCHROME VARIANTS -->
  <div class="plate-hd" style="margin-top:40px;">
    <span class="num">I.b</span>
    <h2>Monochrome <em>variants</em></h2>
    <span class="latin">for reproduction on any ground</span>
  </div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;">
    ${[
      {bg:'var(--ceramic-void)',label:'Gold on void',fill:'gold',ink:'var(--vein-light)',tag:'default'},
      {bg:'#f5f2ea',label:'Black on paper',fill:'black',ink:'#0d0d11',tag:'print · light'},
      {bg:'var(--ceramic-void)',label:'White on void',fill:'white',ink:'#e8ecf5',tag:'reversed'},
