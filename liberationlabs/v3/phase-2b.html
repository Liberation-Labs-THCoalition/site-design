<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>Liberation Labs — Visual Identity, Phase 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root{
    --gold:#c8984a; --gold-light:#f4d98a; --gold-bright:#ffe9a8; --gold-deep:#3a2a0a;
    --bg:#07090f; --paper:#0d1018; --panel:#111523;
    --rule:rgba(232,236,255,.12); --rule-s:rgba(232,236,255,.22);
    --ink:#e8ecf5; --ink-2:#98a0b8; --ink-3:#5c6178;
    --indigo:#1A1F5A; --indigo-2:#2b2f78;
  }
  html,body{background:var(--bg);color:var(--ink);margin:0;font-family:'IBM Plex Sans',sans-serif;}
  body{min-height:100vh;}
  /* graph paper */
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      linear-gradient(rgba(232,236,255,.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,236,255,.022) 1px, transparent 1px);
    background-size:24px 24px;
    mask-image:radial-gradient(ellipse 80% 70% at 50% 20%, #000 30%, transparent 90%);
    -webkit-mask-image:radial-gradient(ellipse 80% 70% at 50% 20%, #000 30%, transparent 90%);
  }
  main{position:relative;z-index:1;}

  /* CHROME */
  .chrome{
    position:sticky;top:0;z-index:100;
    background:rgba(7,9,15,.85);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid var(--rule);
  }
  .chrome-inner{max-width:1680px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 40px;gap:24px;}
  .brand{display:flex;align-items:center;gap:14px;font-family:'IBM Plex Serif',serif;font-weight:300;font-size:15px;color:var(--ink);letter-spacing:-.005em;}
  .brand .seal{
    width:22px;height:22px;border-radius:50%;
    background:radial-gradient(circle at 32% 30%, #fff4c8 0%, #f4d98a 18%, #c8984a 45%, #6a4510 80%, #2a1c0a 100%);
    box-shadow:inset 0 0 6px rgba(0,0,0,.5), 0 0 0 1px rgba(244,217,138,.2);
  }
  .brand em{font-style:italic;color:var(--ink-2);font-weight:300;}
  .brand .sep{color:var(--ink-3);}
  .tabs{display:flex;gap:4px;background:rgba(232,236,255,.03);border:1px solid var(--rule);border-radius:2px;padding:3px;}
  .tab{
    appearance:none;border:0;background:transparent;color:var(--ink-2);
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;
    padding:9px 16px;border-radius:2px;cursor:pointer;display:flex;align-items:center;gap:10px;
    transition:all .2s ease;
  }
  .tab:hover{color:var(--ink);}
  .tab.is-active{background:linear-gradient(180deg,#2a1c0a,#1a1205);color:var(--gold-light);box-shadow:inset 0 1px 0 rgba(244,217,138,.2);}
  .tab .num{color:var(--ink-3);font-size:9.5px;}
  .tab.is-active .num{color:var(--gold);}
  .chrome-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.18em;color:var(--ink-3);text-transform:uppercase;}

  /* PAGES */
  .page{display:none;}
  .page.is-active{display:block;}

  /* Shared plate header */
  .plate-head{padding:40px 40px 24px;max-width:1680px;margin:0 auto;display:flex;align-items:baseline;gap:22px;border-bottom:2px solid var(--gold);}
  .plate-head::after{content:'';}
  .plate-head .num{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;padding:4px 8px;border:1px solid rgba(200,152,74,.4);border-radius:2px;}
  .plate-head h2{font-family:'IBM Plex Serif',serif;font-weight:300;font-size:26px;margin:0;letter-spacing:-.005em;color:var(--ink);}
  .plate-head h2 em{font-style:italic;color:var(--gold-light);}
  .plate-head .latin{font-family:'IBM Plex Serif',serif;font-style:italic;font-size:14px;color:var(--ink-2);margin-left:auto;}

  /* ===================== PLATE I — HOMEPAGE ===================== */
  .home{padding:0;}
  .home-frame{max-width:1680px;margin:0 auto;border-left:1px solid var(--rule);border-right:1px solid var(--rule);}

  /* top sub-bar (site nav) */
  .site-nav{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 48px;border-bottom:1px solid var(--rule);
  }
  .site-nav .logo{display:flex;align-items:center;gap:10px;font-family:'IBM Plex Serif',serif;font-size:17px;color:var(--ink);letter-spacing:-.005em;}
  .site-nav .logo .seal{width:20px;height:20px;border-radius:50%;background:radial-gradient(circle at 32% 30%, #fff4c8 0%, #f4d98a 18%, #c8984a 45%, #6a4510 80%, #2a1c0a 100%);box-shadow:inset 0 0 4px rgba(0,0,0,.5);}
  .site-nav .logo small{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.2em;color:var(--ink-3);text-transform:uppercase;margin-left:6px;}
  .site-nav .links{display:flex;gap:28px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-2);}
  .site-nav .links a{color:inherit;text-decoration:none;padding-bottom:3px;border-bottom:1px solid transparent;}
  .site-nav .links a.active{color:var(--ink);border-bottom-color:var(--gold);}
  .site-nav .cta{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;padding:9px 18px;border-radius:2px;background:linear-gradient(180deg,#f4d98a,#c8984a 50%,#8a6320);color:#2a1c0a;font-weight:500;box-shadow:inset 0 1px 0 rgba(255,255,255,.4);}

  /* HERO */
  .hero{position:relative;padding:48px 48px 64px;border-bottom:1px solid var(--rule);}
  .hero .bg-glow{position:absolute;inset:0;pointer-events:none;background:radial-gradient(900px 500px at 85% 40%, rgba(200,152,74,.10) 0%, transparent 55%), radial-gradient(1100px 600px at 15% 120%, rgba(26,31,90,.30) 0%, transparent 60%);}
  .hero-body{position:relative;display:grid;grid-template-columns:1fr 1.1fr;gap:56px;align-items:start;padding-top:16px;}
  .hero .tag{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .hero .tag::before{content:'';width:16px;height:1px;background:var(--gold);}
  .hero .latin{font-family:'IBM Plex Serif',serif;font-style:italic;font-weight:300;font-size:15px;color:var(--ink-2);margin-bottom:22px;}
  .hero h1{font-family:'IBM Plex Serif',serif;font-weight:280;font-size:84px;line-height:.96;letter-spacing:-.03em;margin:0 0 30px;color:var(--ink);}
  .hero h1 em{font-style:italic;color:var(--gold-light);font-weight:280;}
  .hero .sub{font-family:'IBM Plex Serif',serif;font-size:17px;line-height:1.55;color:var(--ink);max-width:460px;margin:0 0 32px;font-weight:300;}
  .hero .sub em{font-style:italic;color:var(--gold-light);}

  .hero .fieldset{border:1px solid var(--rule);padding:18px 22px;margin-bottom:28px;border-radius:2px;background:rgba(17,21,35,.4);display:grid;grid-template-columns:repeat(3,1fr);gap:18px 22px;position:relative;}
  .hero .fieldset .legend{position:absolute;top:-8px;left:14px;background:var(--bg);padding:0 8px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);}
  .hero .fieldset .cell .k{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);margin-bottom:4px;}
  .hero .fieldset .cell .v{font-family:'IBM Plex Serif',serif;font-style:italic;font-size:15px;color:var(--ink);font-weight:300;line-height:1.3;}
  .hero .fieldset .cell .v b{color:var(--gold-light);font-style:normal;font-weight:500;}

  .hero .actions{display:flex;gap:12px;}
  .hero .btn{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;padding:13px 22px;border-radius:2px;cursor:pointer;border:0;background:linear-gradient(180deg,#f4d98a,#c8984a 50%,#8a6320);color:#2a1c0a;font-weight:500;box-shadow:inset 0 1px 0 rgba(255,255,255,.4);}
  .hero .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--rule-s);box-shadow:none;}

  /* hero plate (diagram) */
  .plate-fig{position:relative;border:1px solid var(--rule);border-radius:2px;background:linear-gradient(180deg, rgba(17,21,35,.55), rgba(7,9,15,.9));padding:18px;}
  .plate-fig .fig-head{display:flex;align-items:baseline;justify-content:space-between;padding-bottom:12px;border-bottom:1px solid var(--rule);margin-bottom:12px;}
  .plate-fig .fig-head .t{font-family:'IBM Plex Serif',serif;font-style:italic;font-size:14.5px;color:var(--ink);}
  .plate-fig .fig-head .t b{font-style:normal;font-weight:500;color:var(--gold-light);margin-right:8px;}
  .plate-fig .fig-head .src{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.14em;color:var(--ink-3);text-transform:uppercase;}
  .plate-fig svg{display:block;width:100%;height:auto;}
  .plate-fig .legend{display:grid;grid-template-columns:repeat(3,1fr);gap:10px 18px;margin-top:14px;padding-top:12px;border-top:1px solid var(--rule);}
  .plate-fig .legend .ent{display:flex;align-items:flex-start;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.08em;color:var(--ink-2);line-height:1.5;}
  .plate-fig .legend .ent .n{color:var(--gold);font-weight:500;min-width:18px;}
  .plate-fig .legend .ent em{font-family:'IBM Plex Serif',serif;font-style:italic;font-size:11px;color:var(--ink);margin-left:6px;}

  /* THESIS strip */
  .thesis{padding:88px 48px;border-bottom:1px solid var(--rule);text-align:center;max-width:1080px;margin:0 auto;}
  .thesis .k{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;margin-bottom:28px;}
  .thesis p{font-family:'IBM Plex Serif',serif;font-weight:300;font-style:italic;font-size:38px;line-height:1.28;color:var(--ink);margin:0;letter-spacing:-.015em;}
  .thesis p em{color:var(--gold-light);font-style:italic;font-weight:400;}
  .thesis .by{margin-top:28px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--ink-3);text-transform:uppercase;}

  /* PROJECTS plate */
  .projects{padding:56px 48px;border-bottom:1px solid var(--rule);}
  .projects > h3{font-family:'IBM Plex Serif',serif;font-weight:300;font-size:28px;margin:0 0 4px;letter-spacing:-.01em;color:var(--ink);}
  .projects > h3 em{font-style:italic;color:var(--gold-light);}
  .projects > .desc{font-family:'IBM Plex Serif',serif;font-style:italic;font-size:15px;color:var(--ink-2);margin:0 0 32px;font-weight:300;}
  .proj-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .proj{border:1px solid var(--rule);background:rgba(17,21,35,.4);padding:0;border-radius:2px;position:relative;display:flex;flex-direction:column;overflow:hidden;}
  .proj .num{position:absolute;top:-1px;right:-1px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:#2a1c0a;background:var(--gold);padding:4px 10px;z-index:2;}
  .proj .mural{aspect-ratio:1/1;width:100%;background:radial-gradient(ellipse at 50% 40%, #1A1F5A 0%, #0a0d2a 60%, #05070d 100%);position:relative;overflow:hidden;border-bottom:1px solid var(--rule);}
  .proj .mural svg{display:block;width:100%;height:100%;}
  .proj .body{padding:20px 22px 18px;display:flex;flex-direction:column;flex:1;}
  .proj h4{font-family:'IBM Plex Serif',serif;font-weight:400;font-size:19px;margin:0 0 3px;color:var(--ink);letter-spacing:-.005em;}
  .proj h4 em{font-style:italic;color:var(--gold-light);}
  .proj .sci{font-family:'IBM Plex Serif',serif;font-style:italic;font-size:12px;color:var(--ink-3);margin-bottom:12px;font-weight:300;}
  .proj p{font-family:'IBM Plex Serif',serif;font-size:13.5px;line-height:1.5;color:var(--ink-2);margin:0 0 16px;font-weight:300;}
  .proj .foot{margin-top:auto;display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--rule);font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);}
  .proj .foot .st{color:var(--gold);}

  /* CONSTRAINTS plate — VALUES.json */
  .constraints{padding:64px 48px;border-bottom:1px solid var(--rule);display:grid;grid-template-columns:1fr 1.15fr;gap:56px;}
  .constraints h3{font-family:'IBM Plex Serif',serif;font-weight:300;font-size:32px;margin:0 0 16px;letter-spacing:-.01em;color:var(--ink);line-height:1.05;}
  .constraints h3 em{font-style:italic;color:var(--gold-light);}
  .constraints .latin{font-family:'IBM Plex Serif',serif;font-style:italic;font-size:14px;color:var(--ink-2);margin-bottom:20px;font-weight:300;}
  .constraints p{font-family:'IBM Plex Serif',serif;font-size:15px;line-height:1.6;color:var(--ink);max-width:440px;margin:0 0 14px;font-weight:300;}
  .constraints p em{color:var(--gold-light);font-style:italic;}
  .constraints ul{list-style:none;padding:0;margin:18px 0 0;display:flex;flex-direction:column;gap:8px;}
  .constraints ul li{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;color:var(--ink-2);text-transform:none;display:flex;align-items:center;gap:10px;}
  .constraints ul li::before{content:'—';color:var(--gold);}
  .code-plate{border:1px solid var(--rule);border-radius:2px;background:linear-gradient(180deg, rgba(17,21,35,.55), rgba(7,9,15,.9));padding:18px;position:relative;}
  .code-plate .head{display:flex;align-items:baseline;justify-content:space-between;padding-bottom:12px;border-bottom:1px solid var(--rule);margin-bottom:16px;}
  .code-plate .head .t{font-family:'IBM Plex Serif',serif;font-style:italic;font-size:14.5px;color:var(--ink);}
  .code-plate .head .t b{font-style:normal;color:var(--gold-light);font-weight:500;margin-right:8px;}
  .code-plate .head .src{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.14em;color:var(--ink-3);text-transform:uppercase;}
  .code-plate pre{font-family:'IBM Plex Mono',monospace;font-size:13px;line-height:1.8;color:var(--ink-2);margin:0;white-space:pre;}
  .code-plate .c{color:var(--ink-3);}
  .code-plate .k{color:var(--gold-light);}
  .code-plate .s{color:#cdd3ea;}
  .code-plate .n{color:#98c5e8;}
  .code-plate .b{color:var(--ink);}

  /* RESIDENCY / Eligibility */
  .residency{padding:64px 48px;border-bottom:1px solid var(--rule);display:grid;grid-template-columns:1.1fr 1fr;gap:56px;}
  .residency h3{font-family:'IBM Plex Serif',serif;font-weight:300;font-size:32px;margin:0 0 16px;letter-spacing:-.01em;color:var(--ink);line-height:1.05;}
  .residency h3 em{font-style:italic;color:var(--gold-light);}
  .residency .latin{font-family:'IBM Plex Serif',serif;font-style:italic;font-size:14px;color:var(--ink-2);margin-bottom:20px;font-weight:300;}
  .residency p{font-family:'IBM Plex Serif',serif;font-size:15px;line-height:1.6;color:var(--ink);margin:0 0 14px;font-weight:300;max-width:460px;}
  .residency .btn{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;padding:13px 22px;border-radius:2px;cursor:pointer;border:0;background:linear-gradient(180deg,#f4d98a,#c8984a 50%,#8a6320);color:#2a1c0a;font-weight:500;box-shadow:inset 0 1px 0 rgba(255,255,255,.4);margin-top:20px;display:inline-block;text-decoration:none;}
  .elig{border:1px solid var(--rule);border-radius:2px;padding:24px;background:rgba(17,21,35,.4);}
  .elig .head{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);padding-bottom:12px;border-bottom:1px solid var(--rule);margin-bottom:14px;}
  .elig dl{display:grid;grid-template-columns:auto 1fr;gap:12px 20px;margin:0;}
  .elig dt{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);padding-top:3px;}
  .elig dd{margin:0;font-family:'IBM Plex Serif',serif;font-size:14.5px;color:var(--ink);font-weight:300;line-height:1.4;}
  .elig dd em{font-style:italic;color:var(--gold-light);}
  .elig dd.free{color:var(--gold-light);font-style:italic;}

  /* COLOPHON */
  .colophon{padding:40px 48px;display:flex;justify-content:space-between;gap:18px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);}
  .colophon b{color:var(--gold-light);font-weight:500;}

  /* ===================== PLATE II — LOGO SYSTEM ===================== */
  .logo-page{padding:40px 40px 80px;max-width:1680px;margin:0 auto;}
  .logo-intro{padding:32px 0 56px;border-bottom:1px solid var(--rule);display:grid;grid-template-columns:1.2fr .8fr;gap:56px;align-items:end;}
  .logo-intro h3{font-family:'IBM Plex Serif',serif;font-weight:300;font-size:42px;margin:0 0 12px;letter-spacing:-.015em;color:var(--ink);line-height:1;}
  .logo-intro h3 em{font-style:italic;color:var(--gold-light);}
  .logo-intro p{font-family:'IBM Plex Serif',serif;font-size:16px;line-height:1.55;color:var(--ink);max-width:540px;margin:0;font-weight:300;}
  .logo-intro .meta{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);line-height:1.9;text-align:right;}
  .logo-intro .meta b{color:var(--ink);font-weight:500;}

  .logo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;padding:40px 0;}
  .logo-card{border:1px solid var(--rule);border-radius:2px;background:rgba(17,21,35,.4);padding:28px;position:relative;min-height:360px;display:flex;flex-direction:column;}
  .logo-card .pin{position:absolute;top:-1px;left:-1px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:#2a1c0a;background:var(--gold);padding:4px 10px;}
  .logo-card .stage{flex:1;background:radial-gradient(ellipse at center, rgba(26,31,90,.25) 0%, transparent 65%), #05070d;border:1px solid var(--rule);border-radius:2px;display:flex;align-items:center;justify-content:center;padding:40px;min-height:220px;}
  .logo-card .stage svg{max-width:100%;max-height:160px;}
  .logo-card .meta{display:grid;grid-template-columns:1fr 1fr;gap:14px 22px;margin-top:18px;}
  .logo-card .meta .k{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);}
  .logo-card .meta .v{font-family:'IBM Plex Serif',serif;font-style:italic;font-size:14px;color:var(--ink);margin-top:3px;font-weight:300;}
  .logo-card .name{font-family:'IBM Plex Serif',serif;font-weight:400;font-size:20px;color:var(--ink);margin-bottom:4px;letter-spacing:-.005em;padding-top:14px;border-top:1px solid var(--rule);}
  .logo-card .name em{font-style:italic;color:var(--gold-light);}
  .logo-card .desc{font-family:'IBM Plex Serif',serif;font-size:13.5px;color:var(--ink-2);line-height:1.5;font-weight:300;margin:0;}

  /* lockups row */
  .lockups{padding:48px 0;border-top:1px solid var(--rule);}
  .lockups h4{font-family:'IBM Plex Serif',serif;font-weight:300;font-size:26px;margin:0 0 4px;letter-spacing:-.01em;color:var(--ink);}
  .lockups h4 em{font-style:italic;color:var(--gold-light);}
  .lockups .sub{font-family:'IBM Plex Serif',serif;font-style:italic;font-size:14px;color:var(--ink-2);margin-bottom:24px;font-weight:300;}
  .lockup-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  .lockup{border:1px solid var(--rule);border-radius:2px;background:#05070d;padding:40px 32px;min-height:180px;display:flex;align-items:center;justify-content:center;position:relative;}
  .lockup .pin{position:absolute;bottom:8px;left:10px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);}

  /* ===================== PLATE III — GRANT ONE-PAGER ===================== */
  .one-pager{padding:40px 40px 80px;max-width:1680px;margin:0 auto;}
  .doc-frame{background:#fdfbf4;color:#1a1811;border:1px solid rgba(0,0,0,.1);box-shadow:0 20px 60px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.03);max-width:1020px;margin:24px auto;border-radius:2px;position:relative;min-height:1440px;}
  .doc-frame::before{
    content:'';position:absolute;inset:0;pointer-events:none;
    background-image:linear-gradient(rgba(26,24,17,.05) 1px, transparent 1px), linear-gradient(90deg, rgba(26,24,17,.05) 1px, transparent 1px);
    background-size:20px 20px;
    mask-image:radial-gradient(ellipse 90% 80% at 50% 30%, #000 40%, transparent 95%);
    -webkit-mask-image:radial-gradient(ellipse 90% 80% at 50% 30%, #000 40%, transparent 95%);
    opacity:.35;

// ================= CHROME + TWEAKS =================
(function(){
  const KEY='liblabs_p2';
  const tabs=document.querySelectorAll('.tab');
  const pages=document.querySelectorAll('.page');
  function showDir(dir){
    tabs.forEach(t=>t.classList.toggle('is-active', t.dataset.dir===dir));
    pages.forEach(p=>p.classList.toggle('is-active', p.dataset.dir===dir));
    localStorage.setItem(KEY, dir);
    window.scrollTo({top:0});
  }
  tabs.forEach(t=>t.addEventListener('click',()=>showDir(t.dataset.dir)));
  const saved=localStorage.getItem(KEY);
  if(saved && document.querySelector('.tab[data-dir="'+saved+'"]')) showDir(saved);

  // Tweaks
  const tweaksEl=document.getElementById('tweaks');
  const state={...TWEAK_DEFAULTS};
  function applyState(){
    document.getElementById('l-latin').textContent=state.latin;
    document.getElementById('l-gold').textContent=state.gold;
    document.getElementById('l-density').textContent=state.density;
    document.querySelectorAll('[data-latin]').forEach(el=>{
      if(state.latin==='off') el.style.display='none';
      else el.style.display='';
      if(state.latin==='full') el.style.fontStyle='italic';
    });
    // gold intensity
    const goldMap={quiet:'#b58a3f',normal:'#c8984a',rich:'#e8b85a'};
    const lightMap={quiet:'#e0c070',normal:'#f4d98a',rich:'#ffe9a8'};
    document.documentElement.style.setProperty('--gold', goldMap[state.gold]);
    document.documentElement.style.setProperty('--gold-light', lightMap[state.gold]);
    // density
    if(state.density==='dense'){
      document.body.style.setProperty('--_density','.85');
    } else {
      document.body.style.setProperty('--_density','1');
    }
  }
  tweaksEl.querySelectorAll('.seg').forEach(seg=>{
    seg.querySelectorAll('button').forEach(b=>{
      b.addEventListener('click',()=>{
        const k=seg.dataset.k, v=b.dataset.v;
        seg.querySelectorAll('button').forEach(x=>x.classList.toggle('on', x===b));
        state[k]=v;
        applyState();
        window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}}, '*');
      });
    });
  });
  document.getElementById('t-close').addEventListener('click',()=>{
    tweaksEl.classList.remove('is-on');
    window.parent.postMessage({type:'__edit_mode_deactivated'}, '*');
  });
  window.addEventListener('message',(e)=>{
    const d=e.data||{};
    if(d.type==='__activate_edit_mode') tweaksEl.classList.add('is-on');
    if(d.type==='__deactivate_edit_mode') tweaksEl.classList.remove('is-on');
  });
  applyState();
  window.parent.postMessage({type:'__edit_mode_available'}, '*');
})();
</script>
